services:
  selenium:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
      - "7900:7900" #VNC port to watch the browser at localhost:7900
    shared_memory_size: 2g

  scraper:
    build: .
    depends_on:
      - selenium
    command: python test/test.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - SELENIUM_REMOTE_URL=http://chrome:4444/wd/hub
